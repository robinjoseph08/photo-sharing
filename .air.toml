root = "."
tmp_dir = "tmp/air"

[build]
args_bin = []
bin = "./tmp/air/memento"
cmd = "mise build:air"
delay = 1000
entrypoint = ["./tmp/air/memento"]
exclude_dir = ["app", "dist", "node_modules", "tmp"]
exclude_file = []
exclude_regex = ["_test.go"]
exclude_unchanged = false
follow_symlink = false
include_dir = []
include_ext = ["go"]
include_file = ["tygo.yaml"]
kill_delay = "1s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = ["mise types:generate"]
rerun = false
rerun_delay = 500
send_interrupt = true
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
